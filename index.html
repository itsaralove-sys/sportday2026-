<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Singha Sports Day 2026</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://img1.pic.in.th/images/LogoSportDark.png">
  <link rel="apple-touch-icon" href="https://img1.pic.in.th/images/LogoSportDark.png">

  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#0a0a0a; }
    iframe { width:100%; height:100vh; border:none; display:block; }
  </style>
</head>
<body>
  <iframe id="app" allowfullscreen></iframe>
  <script>
    // แก้บรรทัดนี้ทุกครั้งที่ deployment URL เปลี่ยน
    var BASE = "https://script.google.com/macros/s/AKfycbxiJw2tOHLp7tZ4-Fkok0WLVYlQXXb8_qHft0q3uIYG4KAl6BN4Nzax6PXOLlMOQzlzHg/exec";
    // ส่ง query string จากลิงก์ที่เปิดหน้านี้ (เช่น ?page=admin หรือ ?page=admin&sport=แบดมินตัน) ต่อไปยัง exec URL อัตโนมัติ
    document.getElementById('app').src = BASE + window.location.search;
  </script>
</body>
</html>
